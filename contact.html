<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Cameron McNamara</title>

    <script>
        const t = localStorage.getItem('theme');
        if (t) document.documentElement.className = t;
    </script>

    <link rel="stylesheet" href="https://unpkg.com/open-props/open-props.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/open-props/normalize.min.css" />
    <link rel="stylesheet" href="/css/global.css" />
    <link rel="stylesheet" href="/css/contact.css" />

    <script src="/js/theme-switcher.js" defer></script>
    <script src="/js/nav.js" defer></script>

</head>

<body>
    <header>
        <nav>
            <a href="/" class="nav-logo">Cameron McNamara</a>

            <button class="nav-toggle" id="nav-toggle" aria-label="Toggle menu" aria-expanded="false">
                ☰
            </button>

            <ul role="list" id="nav-menu">
                <li><a href="/">Home</a></li>
                <li><a href="/about.html">About</a></li>
                <li><a href="/resume.html">Resume</a></li>
                <li><a href="/projects.html">Projects</a></li>
                <li><a href="/contact.html">Contact</a></li>
            </ul>

            <label for="theme-select">🎨</label>
            <select id="theme-select">
                <option value="">Light</option>
                <option value="dark">Dark</option>
                <option value="warm">Warm</option>
                <option value="ocean">Ocean</option>
                <option value="contrast">High Contrast</option>
                <option value="retro">Retro</option>
                <option value="western">Western</option>
                <option value="redsox">Boston Red Sox</option>
                <option value="bruins">Boston Bruins</option>
            </select>
        </nav>
    </header>

    <main id="main-content">
        <section class="contact-wrapper">
            <h1>Get in Touch</h1>
            <p class="page-sub">Have a question or want to connect? Send me a message.</p>

            <!-- Success message — hidden unless ?success=true -->
            <p class="contact-success" id="contact-success" hidden>
                Message sent! I'll get back to you soon.
            </p>

            <form class="contact-form" action="/contact" method="POST">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" required autocomplete="name" placeholder="Alan Turing" />

                <label for="email">Email</label>
                <input type="email" id="email" name="email" required autocomplete="email"
                    placeholder="alan.turing@email.com" />

                <label for="message">Message</label>
                <textarea id="message" name="message" required rows="6"
                    placeholder="Include a reason for contact"></textarea>

                <button type="submit">Send Message</button>
                <input type="hidden" name="_next" value="https://cameron-mcnamara.com/contact.html?success=true" />

            </form>
        </section>
    </main>

    <footer>
        <small>&copy; 2025 Cameron McNamara</small>
        <ul role="list">
            <li><a href="https://github.com/cammcnamara" target="_blank" rel="noopener">GitHub</a></li>
            <li><a href="https://linkedin.com/in/cameronmcnamara" target="_blank" rel="noopener">LinkedIn</a></li>
        </ul>
    </footer>

    <script src="/js/contact.js" defer></script>
</body>

</html>
